<!-- ================= DRIVE SENSE PRO MAX (ALL-IN-ONE SYSTEM) ================= -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DriveSense Pro Max</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; margin:0; background:#0f172a; color:white; }
header { background:#1e293b; padding:15px; text-align:center; font-size:22px; }
.container { padding:20px; }
.card { background:#1e293b; padding:15px; border-radius:10px; margin-bottom:15px; }
input, select, button { padding:8px; margin:5px; border-radius:6px; border:none; }
button { background:#3b82f6; color:white; cursor:pointer; }
button:hover { background:#2563eb; }
</style>
</head>

<body>
<header>🚗 DriveSense Pro Max (All-in-One Vehicle Platform)</header>

<div class="container">

<!-- 1. GARAGE FINDER -->
<div class="card">
<h2>🛠️ Garage Finder</h2>
<select id="garageSelect">
<option>ABC Motors - ₹500</option>
<option>SpeedFix Garage - ₹700</option>
<option>AutoCare Hub - ₹400</option>
</select>
<button onclick="bookGarage()">Book Service</button>
<p id="garageMsg"></p>
</div>

<!-- 2. FUEL TRACKER -->
<div class="card">
<h2>⛽ Fuel Tracker</h2>
<input id="fuel" placeholder="Fuel (liters)">
<input id="cost" placeholder="Cost">
<button onclick="addFuel()">Add</button>
<canvas id="fuelChart"></canvas>
</div>

<!-- 3. VEHICLE HEALTH -->
<div class="card">
<h2>🔧 Vehicle Health Analyzer</h2>
<select id="symptom">
<option>Engine Noise</option>
<option>Low Mileage</option>
<option>Brake Issue</option>
</select>
<button onclick="analyzeHealth()">Analyze</button>
<p id="healthResult"></p>
</div>

<!-- 4. ROUTE OPTIMIZATION -->
<div class="card">
<h2>🚦 Route Optimization</h2>
<input id="distance" placeholder="Distance (km)">
<button onclick="calcRoute()">Calculate</button>
<p id="routeResult"></p>
</div>

<!-- 5. THEFT SYSTEM -->
<div class="card">
<h2>🔐 Theft Detection</h2>
<button onclick="triggerAlert()">Simulate Theft</button>
<p id="theftMsg"></p>
</div>

<!-- 6. DOCUMENT MANAGER -->
<div class="card">
<h2>🧾 Document Manager</h2>
<input id="docName" placeholder="Document Name">
<input type="date" id="expiry">
<button onclick="addDoc()">Save</button>
<ul id="docList"></ul>
</div>

<!-- 7. CAR COMPARISON -->
<div class="card">
<h2>🚗 Car Comparison</h2>
<select id="car1">
<option value="20">Car A (20 km/l)</option>
<option value="15">Car B (15 km/l)</option>
</select>
<select id="car2">
<option value="18">Car C (18 km/l)</option>
<option value="22">Car D (22 km/l)</option>
</select>
<button onclick="compareCars()">Compare</button>
<p id="compareResult"></p>
</div>

<!-- 8. DRIVER BEHAVIOR -->
<div class="card">
<h2>🧠 Driver Behavior</h2>
<input id="speed" placeholder="Speed">
<input id="brake" placeholder="Braking events">
<button onclick="analyzeDriver()">Analyze</button>
<p id="driverResult"></p>
</div>

<!-- 9. EV STATION -->
<div class="card">
<h2>🔋 EV Charging</h2>
<select>
<option>Station A - Available</option>
<option>Station B - Busy</option>
</select>
<button>Book Slot</button>
</div>

</div>

<script>

// GARAGE
function bookGarage(){
document.getElementById("garageMsg").innerText="Service Booked Successfully";
}

// FUEL
let fuelData=[];
let chart;
function addFuel(){
let f=document.getElementById("fuel").value;
fuelData.push(f);
updateFuelChart();
}

function updateFuelChart(){
let ctx=document.getElementById("fuelChart");
if(chart) chart.destroy();
chart=new Chart(ctx,{type:"line",data:{labels:fuelData.map((_,i)=>i+1),datasets:[{data:fuelData}]}});
}

// HEALTH
function analyzeHealth(){
let s=document.getElementById("symptom").value;
let result="Low Risk";
if(s==="Engine Noise") result="High Risk - Check Engine";
if(s==="Brake Issue") result="Critical";
document.getElementById("healthResult").innerText=result;
}

// ROUTE
function calcRoute(){
let d=document.getElementById("distance").value;
let time=d/40;
document.getElementById("routeResult").innerText="Estimated Time: "+time+" hrs";
}

// THEFT
function triggerAlert(){
document.getElementById("theftMsg").innerText="⚠️ Theft Alert Sent";
}

// DOCS
let docs=[];
function addDoc(){
let name=document.getElementById("docName").value;
let exp=document.getElementById("expiry").value;
docs.push({name,exp});
displayDocs();
}

function displayDocs(){
let list=document.getElementById("docList");
list.innerHTML="";
docs.forEach(d=>{
let li=document.createElement("li");
li.innerText=d.name+" expires on "+d.exp;
list.appendChild(li);
});
}

// CAR COMPARE
function compareCars(){
let c1=document.getElementById("car1").value;
let c2=document.getElementById("car2").value;
let better=c1>c2?"Car 1 Better":"Car 2 Better";
document.getElementById("compareResult").innerText=better;
}

// DRIVER
function analyzeDriver(){
let speed=document.getElementById("speed").value;
let brake=document.getElementById("brake").value;
let score=100-speed-brake*5;
document.getElementById("driverResult").innerText="Score: "+score;
}

</script>

</body>
</html>
